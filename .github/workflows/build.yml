name: Build HaloDiscordBot JAR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: gradle shadowJar

      - name: Prepare release package
        run: |
          mkdir -p release-package
          cp build/libs/HaloDiscordBot.jar release-package/
          cp config.yml release-package/
          cp sapp_discord.lua release-package/

      - name: Create run.bat
        run: |
          cat > release-package/run.bat << 'EOF'
          @echo off
          title HaloDiscordBot Launcher

          cd /d "%~dp0"

          set JAR=HaloDiscordBot.jar

          if not exist "%JAR%" (
              echo ERROR: Jar not found at %JAR%
              echo Make sure HaloDiscordBot.jar is in the same directory as run.bat
              pause
              exit /b 1
          )

          java -jar "%JAR%"

          echo.
          echo Bot stopped or crashed.
          pause
          EOF

      - name: Create run.sh
        run: |
          cat > release-package/run.sh << 'EOF'
          #!/usr/bin/env bash

          clear
          echo "HaloDiscordBot Launcher"

          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR" || exit 1

          JAR="HaloDiscordBot.jar"

          if [[ ! -f "$JAR" ]]; then
              echo "ERROR: Jar not found at $JAR"
              echo "Make sure HaloDiscordBot.jar is in the same directory as run.sh"
              read -rp "Press Enter to continue..."
              exit 1
          fi

          java -jar "$JAR"

          echo
          echo "Bot stopped or crashed."
          read -rp "Press Enter to continue..."
          EOF
          chmod +x release-package/run.sh

      - name: Create zip archive
        run: |
          cd release-package
          zip -r ../HaloDiscordBot.zip .
          cd ..

      - name: Upload release package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaloDiscordBot
          path: HaloDiscordBot.zip
          if-no-files-found: error

      - name: Create Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: HaloDiscordBot.zip
          generate_release_notes: true