name: Build HaloDiscordBot JAR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: gradle shadowJar

      - name: Prepare release package
        run: |
          mkdir -p release-package
          cp build/libs/HaloDiscordBot.jar release-package/
          cp config.yml release-package/
          cp discord.lua release-package/
          # Create the zip archive
          cd release-package
          zip -r ../HaloDiscordBot.zip .
          cd ..

      - name: Upload release package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaloDiscordBot
          path: HaloDiscordBot.zip
          if-no-files-found: error

      - name: Create Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: HaloDiscordBot.zip
          generate_release_notes: true